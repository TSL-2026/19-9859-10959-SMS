name: Deploy Safety Monitor

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - ".github/**"
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE: safety-monitor
  DB_NAME: safety_monitor_prod
  DB_USER: safety_user
  ARTIFACT_REPO: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
        env:
          JWT_SECRET: test-secret
          DB_HOST: localhost
          DB_NAME: safety_monitor_test
          SMTP_HOST: mock
          SMTP_PORT: "0"
          SMTP_USER: mock
          SMTP_PASS: mock
          SMTP_FROM: test@example.com

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          IMAGE="${{ env.ARTIFACT_REPO }}/${{ env.SERVICE }}:${{ github.sha }}"
          docker build -t "$IMAGE" --pull --no-cache .
          docker tag "$IMAGE" "${{ env.ARTIFACT_REPO }}/${{ env.SERVICE }}:latest"

      - name: Push to Artifact Registry
        run: |
          docker push "${{ env.ARTIFACT_REPO }}/${{ env.SERVICE }}:${{ github.sha }}"
          docker push "${{ env.ARTIFACT_REPO }}/${{ env.SERVICE }}:latest"

      - name: Terraform Apply
        working-directory: infra
        run: |
          cat > terraform.tfvars <<EOF
          project_id         = "${{ env.PROJECT_ID }}"
          region             = "${{ env.REGION }}"
          environment        = "dev"
          db_password        = "${{ secrets.DB_PASSWORD }}"
          jwt_secret         = "${{ secrets.JWT_SECRET }}"
          encryption_key     = "${{ secrets.ENCRYPTION_KEY }}"
          budget_alert_email = "${{ secrets.BUDGET_ALERT_EMAIL }}"
          billing_account_id = "${{ secrets.BILLING_ACCOUNT_ID }}"
          EOF
          terraform init
          terraform apply -auto-approve

      - name: Run Database Migrations
        run: |
          wget -q https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.15.0/cloud-sql-proxy.linux.amd64 \
            -O /tmp/cloud-sql-proxy
          chmod +x /tmp/cloud-sql-proxy
          /tmp/cloud-sql-proxy \
            --port 5432 \
            "${{ env.PROJECT_ID }}:${{ env.REGION }}:${{ secrets.CLOUD_SQL_INSTANCE_NAME }}" &
          sleep 5
          export DB_HOST=localhost
          export DB_NAME="${{ env.DB_NAME }}"
          export DB_USER="${{ env.DB_USER }}"
          export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
          node src/db/migrations/run.js

      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ env.ARTIFACT_REPO }}/${{ env.SERVICE }}:${{ github.sha }}"
          gcloud run deploy "${{ env.SERVICE }}" \
            --image "$IMAGE" \
            --region "${{ env.REGION }}" \
            --platform managed \
            --quiet

      - name: Smoke Test
        run: |
          URL=$(gcloud run services describe "${{ env.SERVICE }}" \
            --region "${{ env.REGION }}" \
            --format='value(status.url)')
          echo "Service URL: $URL"
          sleep 15
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL/health")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              curl -s "$URL/health"
              exit 0
            fi
            echo "Retry $i — HTTP $STATUS, waiting 5s..."
            sleep 5
          done
          echo "Health check failed after 5 attempts"
          curl -v "$URL/health" 2>&1 || true
          exit 1
