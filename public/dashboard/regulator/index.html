<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regulator Safety Dashboard — Annex 19</title>
<link rel="stylesheet" href="styles.css">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const COLORS = ['#0f3460','#e94560','#16213e','#1a1a2e','#533483','#0db39e','#f5a623','#7ed321','#d0021b','#4a90d9'];

function getToken() {
  const p = new URLSearchParams(window.location.search);
  return p.get('token') || localStorage.getItem('regulator_token') || '';
}

function setToken(t) {
  localStorage.setItem('regulator_token', t);
}

function App() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [exporting, setExporting] = useState(false);
  const [token, setTokenState] = useState(getToken());
  const [tab, setTab] = useState('overview');
  const [jcHealth, setJcHealth] = useState(null);
  const [jcTimeline, setJcTimeline] = useState(null);
  const [jcBenchmark, setJcBenchmark] = useState(null);
  const [jcLoading, setJcLoading] = useState(false);
  const reportRef = useRef(null);

  const fetchData = useCallback(async () => {
    const t = getToken();
    if (!t) { setError('No regulator token found'); setLoading(false); return; }
    setLoading(true); setError(null);
    try {
      const res = await fetch('/api/regulator/export', { headers: { Authorization: 'Bearer ' + t } });
      if (res.status === 401 || res.status === 403) throw new Error('Access denied — invalid or missing regulator token');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      setData(await res.json());
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  }, []);

  const fetchJustCulture = useCallback(async () => {
    const t = getToken();
    if (!t) return;
    setJcLoading(true);
    try {
      const [health, timeline, benchmark] = await Promise.all([
        fetch('/api/just-culture/health', { headers: { Authorization: 'Bearer ' + t } }),
        fetch('/api/just-culture/timeline?months=12', { headers: { Authorization: 'Bearer ' + t } }),
        fetch('/api/just-culture/benchmark', { headers: { Authorization: 'Bearer ' + t } }),
      ]);
      if (health.ok) setJcHealth(await health.json());
      if (timeline.ok) setJcTimeline((await timeline.json()).timeline);
      if (benchmark.ok) setJcBenchmark(await benchmark.json());
    } catch (e) { /* silent */ }
    finally { setJcLoading(false); }
  }, []);

  useEffect(() => {
    if (token) {
      fetchData();
      fetchJustCulture();
    } else {
      setLoading(false);
      setError(null);
    }
  }, [token, fetchData, fetchJustCulture]);

  function handleTokenSubmit(e) {
    e.preventDefault();
    const input = e.target.querySelector('input');
    setTokenState(input.value);
    setToken(input.value);
  }

  function clearToken() {
    localStorage.removeItem('regulator_token');
    setTokenState('');
    setData(null);
    setError(null);
    setJcHealth(null);
    setJcTimeline(null);
    setJcBenchmark(null);
  }

  if (!token) {
    return (
      <div>
        <div className="app-header"><h1>Regulator Safety Dashboard</h1><span className="meta">ICAO Annex 19</span></div>
        <div className="token-bar">
          <span>Enter regulator JWT token:</span>
          <form onSubmit={handleTokenSubmit} style={{ display:'flex', gap:8, flex:1 }}>
            <input type="text" placeholder="eyJhbGciOiJIUzI1NiIs..." style={{ flex:1 }} />
            <button type="submit" className="btn">Connect</button>
          </form>
        </div>
      </div>
    );
  }

  return (
    <div>
      <div className="app-header">
        <h1>Regulator Safety Dashboard</h1>
        <span className="meta">ICAO Annex 19 — Safety Management System</span>
      </div>
      <div className="token-bar">
        <span>Token: {token.slice(0,20)}...</span>
        <button className="btn-secondary" onClick={clearToken}>Disconnect</button>
        <button className="btn-secondary" onClick={() => { fetchData(); fetchJustCulture(); }} disabled={loading || jcLoading}>Refresh</button>
      </div>
      <div className="tabs">
        <button className={'tab' + (tab === 'overview' ? ' active' : '')} onClick={() => setTab('overview')}>SPI Overview</button>
        <button className={'tab' + (tab === 'just-culture' ? ' active' : '')} onClick={() => setTab('just-culture')}>Just Culture Metrics</button>
      </div>
      <div className="dashboard" ref={reportRef}>
        {loading && <div className="loading"><div className="spinner"></div><p>Loading SPI data...</p></div>}
        {error && !loading && tab === 'overview' && (
          <div className="error-state">
            <h2>Failed to load dashboard</h2>
            <p>{error}</p>
            <button className="btn" onClick={fetchData}>Retry</button>
            <button className="btn-secondary" onClick={clearToken} style={{marginLeft:8}}>Change Token</button>
          </div>
        )}
        {!loading && !error && data && tab === 'overview' && <DashboardContent data={data} reportRef={reportRef} exporting={exporting} setExporting={setExporting} jcHealth={jcHealth} />}
        {!loading && !error && !data && tab === 'overview' && <div className="empty-state"><h2>No data available</h2><p>Click Refresh to load SPI data</p></div>}
        {tab === 'just-culture' && <JustCultureMetrics health={jcHealth} timeline={jcTimeline} benchmark={jcBenchmark} loading={jcLoading} token={token} />}
      </div>
    </div>
  );
}

function DashboardContent({ data, reportRef, exporting, setExporting, jcHealth }) {
  const { summary, trends, by_tenant } = data;
  const hasSignals = summary.total_signals > 0;
  const hasAlerts = summary.total_alerts > 0;
  const hasTrends = trends.monthly_signals && trends.monthly_signals.length > 0;

  async function exportPDF() {
    setExporting(true);
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF('landscape', 'mm', 'a4');
      const pageW = 297;
      let y = 16;

      doc.setFontSize(18); doc.setTextColor(26,26,46);
      doc.text('SAFETY PERFORMANCE DASHBOARD', pageW/2, y, { align:'center' }); y += 10;
      doc.setFontSize(10); doc.setTextColor(100,100,100);
      doc.text('ICAO Annex 19 — Safety Management System (SMS) — Aggregated SPI Report', pageW/2, y, { align:'center' }); y += 6;
      doc.text('Generated: ' + new Date().toISOString().split('T')[0] + ' | Period: ' + (summary.period ? (summary.period.from || 'N/A') + ' to ' + (summary.period.to || 'N/A') : 'N/A'), pageW/2, y, { align:'center' }); y += 10;

      doc.setFontSize(11); doc.setTextColor(26,26,46);
      doc.text('Overall Summary', 14, y); y += 6;
      doc.setFontSize(9);
      const sumLines = [
        ['Total Signals', String(summary.total_signals), 'Total Tenants', String(summary.total_tenants)],
        ['Avg Risk Level', String(summary.avg_risk_level), 'Total Alerts', String(summary.total_alerts)],
        ['Open Alerts', String(summary.open_alerts), 'Period', (summary.period ? (summary.period.from||'') + ' — ' + (summary.period.to||'') : 'N/A')],
      ];
      sumLines.forEach(row => {
        doc.text(row[0], 14, y); doc.text(row[1], 60, y);
        doc.text(row[2], 110, y); doc.text(row[3], 160, y);
        y += 5;
      });
      y += 4;

      if (summary.by_type && summary.by_type.length) {
        doc.setFontSize(11); doc.text('Signals by Type', 14, y); y += 6; doc.setFontSize(9);
        summary.by_type.forEach(t => { doc.text('  ' + t.type + ': ' + t.count + ' (' + Math.round(t.count/summary.total_signals*100) + '%)', 14, y); y += 5; });
        y += 2;
      }

      if (summary.alerts_by_level && summary.alerts_by_level.length) {
        doc.setFontSize(11); doc.text('Alerts by Level', 14, y); y += 6; doc.setFontSize(9);
        summary.alerts_by_level.forEach(a => { doc.text('  ' + a.level + ': ' + a.count, 14, y); y += 5; });
        y += 4;
      }

      if (by_tenant && by_tenant.length) {
        doc.setFontSize(11); doc.text('Per-Tenant Comparison (Aggregated Counts Only)', 14, y); y += 7; doc.setFontSize(8);
        doc.setFillColor(240,242,245); doc.rect(14, y-2, 180, 5, 'F');
        doc.text('Tenant', 14, y); doc.text('Signals', 70, y); doc.text('Avg Risk', 100, y); doc.text('Alerts', 130, y); doc.text('Types', 150, y);
        y += 5;
        by_tenant.forEach(t => {
          const types = (t.by_type || []).map(bt => bt.type + ': ' + bt.count).join(', ');
          doc.text(t.tenant_id.slice(0,8)+'...', 14, y); doc.text(String(t.total_signals), 70, y);
          doc.text(String(t.avg_risk), 100, y); doc.text(String(t.total_alerts), 130, y); doc.text(types, 150, y);
          y += 5;
          if (y > 190) { doc.addPage(); y = 16; }
        });
        y += 4;
      }

      doc.setFontSize(7); doc.setTextColor(150,150,150);
      doc.text('This report contains aggregated Safety Performance Indicator (SPI) data only. No personally identifiable information or raw signal data is included.', 14, 195);
      doc.text('Confidential — For authorized regulatory use only.', 14, 199);
      doc.save('annex19-safety-dashboard-' + new Date().toISOString().split('T')[0] + '.pdf');
    } catch (e) { alert('PDF export error: ' + e.message); }
    finally { setExporting(false); }
  }

  return (
    <div>
      <div className="export-bar">
        <button className="btn" onClick={exportPDF} disabled={exporting}>{exporting ? 'Generating PDF...' : 'Export PDF (Annex 19)'}</button>
      </div>

      <div className="cards">
        <div className="card"><div className="label">Total Signals</div><div className="value">{summary.total_signals}</div><div className="sub">Across {summary.total_tenants} tenant(s)</div></div>
        <div className="card"><div className="label">Avg Risk Level</div><div className="value">{summary.avg_risk_level}</div><div className="sub">Severity × Probability</div></div>
        <div className="card"><div className="label">Total Alerts</div><div className="value">{summary.total_alerts}</div><div className="sub">{summary.open_alerts} open</div></div>
        <div className="card"><div className="label">Report Period</div><div className="value">{summary.period ? (summary.period.from || '—') : '—'}</div><div className="sub">to {summary.period ? (summary.period.to || '—') : '—'}</div></div>
      </div>

      <div className="charts-row">
        <ChartCard title="Signals by Type">
          {hasSignals ? <BarChart data={summary.by_type} labelKey="type" valueKey="count" color="#0f3460" /> : <NoData />}
        </ChartCard>
        <ChartCard title="Severity Distribution (1–5)">
          {hasSignals ? <BarChart data={summary.severity_distribution} labelKey="severity" valueKey="count" color="#e94560" /> : <NoData />}
        </ChartCard>
        <ChartCard title="Alerts by Level">
          {hasAlerts ? <DoughnutChart data={summary.alerts_by_level} labelKey="level" valueKey="count" /> : <NoData />}
        </ChartCard>
      </div>

      <div className="charts-row">
        <ChartCard title="Monthly Signal Trends (12 months)">
          {hasTrends ? <LineChart data={trends.monthly_signals} labelKey="month" valueKey="count" color="#0f3460" /> : <NoData />}
        </ChartCard>
        <ChartCard title="Monthly Avg Risk Level">
          {trends.monthly_risk_avg && trends.monthly_risk_avg.length ? <LineChart data={trends.monthly_risk_avg} labelKey="month" valueKey="avg_risk" color="#e94560" /> : <NoData />}
        </ChartCard>
      </div>

      {jcHealth && (
        <div className="just-culture-widget">
          <h3 style={{fontSize:14, color:'#333', marginBottom:12}}>Just Culture Health (ICAO Doc 10959)</h3>
          <div className="jc-widget-grid">
            <div className="jc-widget-card">
              <div className="jc-label">Reporting Rate</div>
              <div className="jc-gauge">
                <svg width="100" height="60" viewBox="0 0 100 60">
                  <path d="M10,55 A40,40 0 0,1 90,55" fill="none" stroke="#eee" strokeWidth="8" strokeLinecap="round"/>
                  <path d={jcGaugeArc(jcHealth.reporting_rate)} fill="none" stroke={jcRateColor(jcHealth.reporting_rate)} strokeWidth="8" strokeLinecap="round"/>
                </svg>
                <div className="jc-gauge-value">{jcHealth.reporting_rate}%</div>
              </div>
              <div className="jc-sub">Target: {jcHealth.target_rate}%</div>
            </div>
            <div className="jc-widget-card">
              <div className="jc-label">Health Score</div>
              <div className="jc-score" style={{color: jcScoreColor(jcHealth.health_score)}}>{jcHealth.health_score}</div>
              <div className="jc-sub">Trend: {jcHealth.trend}</div>
            </div>
            <div className="jc-widget-card jc-widget-wide">
              <div className="jc-label">Top Recommendations</div>
              <ul className="jc-recs">
                {jcHealth.recommendations && jcHealth.recommendations.slice(0,3).map((r, i) => <li key={i}>{r}</li>)}
              </ul>
            </div>
          </div>
        </div>
      )}

      <h3 style={{fontSize:14, color:'#333', marginBottom:8}}>Per-Tenant Aggregated SPI Data</h3>
      {by_tenant && by_tenant.length ? (
        <table>
          <thead><tr><th>Tenant</th><th>Total Signals</th><th>Avg Risk</th><th>Total Alerts</th><th>By Type</th></tr></thead>
          <tbody>
            {by_tenant.map((t, i) => (
              <tr key={i}>
                <td style={{fontFamily:'monospace', fontSize:12}}>{t.tenant_id.slice(0,8)}…</td>
                <td>{t.total_signals}</td>
                <td>{t.avg_risk}</td>
                <td>{t.total_alerts}</td>
                <td>{(t.by_type || []).map(bt => bt.type + ': ' + bt.count).join(', ') || '—'}</td>
              </tr>
            ))}
          </tbody>
        </table>
      ) : <div className="no-data">No tenant data available</div>}
    </div>
  );
}

function ChartCard({ title, children }) {
  return <div className="chart-card"><h3>{title}</h3><div className="chart-wrapper">{children}</div></div>;
}

function NoData() {
  return <div className="no-data" style={{paddingTop:80}}>No data</div>;
}

// ----- Just Culture Helper Functions -----

function jcGaugeArc(pct) {
  const ratio = Math.min(pct, 100) / 100;
  const angle = Math.PI * ratio;
  const r = 40, cx = 50, cy = 55;
  const sx = cx - r * Math.cos(Math.PI), sy = cy - r * Math.sin(Math.PI);
  const ex = cx - r * Math.cos(Math.PI - angle), ey = cy - r * Math.sin(Math.PI - angle);
  const large = ratio > 0.5 ? 1 : 0;
  return 'M' + sx + ',' + sy + ' A' + r + ',' + r + ' 0 ' + large + ',1 ' + ex + ',' + ey;
}

function jcRateColor(pct) {
  if (pct >= 80) return '#2ecc71';
  if (pct >= 60) return '#f39c12';
  return '#e74c3c';
}

function jcScoreColor(score) {
  if (score >= 80) return '#2ecc71';
  if (score >= 60) return '#f39c12';
  return '#e74c3c';
}

function JustCultureMetrics({ health, timeline, benchmark, loading, token }) {
  if (loading) return <div className="loading"><div className="spinner"></div><p>Loading Just Culture data...</p></div>;

  return (
    <div>
      <h2 style={{fontSize:18, color:'#1a1a2e', marginBottom:16}}>Just Culture Metrics <span style={{fontSize:13, color:'#999', fontWeight:400}}>ICAO Doc 10959</span></h2>

      <div className="cards">
        <div className="card">
          <div className="label">Reporting Rate</div>
          <div className="value" style={{color: jcRateColor(health ? health.reporting_rate : 0)}}>
            {health ? health.reporting_rate + '%' : '—'}
          </div>
          <div className="sub">Target: {health ? health.target_rate + '%' : '—'} · {health ? health.actual_voluntary + ' / ' + health.expected_voluntary + ' expected' : ''}</div>
        </div>
        <div className="card">
          <div className="label">Health Score</div>
          <div className="value" style={{color: jcScoreColor(health ? health.health_score : 0)}}>
            {health ? health.health_score : '—'}
          </div>
          <div className="sub">Trend: {health ? health.trend : '—'}</div>
        </div>
        <div className="card">
          <div className="label">Diversity Score</div>
          <div className="value">{health ? health.diversity_score : '—'}</div>
          <div className="sub">Distinct reporter roles</div>
        </div>
        <div className="card">
          <div className="label">Trend Score</div>
          <div className="value">{health ? health.trend_score : '—'}</div>
          <div className="sub">6-month comparison</div>
        </div>
      </div>

      <div className="charts-row">
        <ChartCard title="Voluntary Reports Timeline (12 months)">
          {timeline && timeline.length ? <BarChart data={timeline} labelKey="month" valueKey="count" color="#2ecc71" /> : <NoData />}
        </ChartCard>
        <ChartCard title="Recommendations">
          {health && health.recommendations && health.recommendations.length ? (
            <div style={{padding:20}}>
              <ul className="jc-recs" style={{fontSize:14, lineHeight:2}}>
                {health.recommendations.map((r, i) => <li key={i}>{r}</li>)}
              </ul>
            </div>
          ) : <NoData />}
        </ChartCard>
      </div>

      <div className="charts-row">
        <ChartCard title="Benchmark Comparison">
          {benchmark ? (
            <div style={{padding:20}}>
              <table style={{marginBottom:0}}>
                <thead><tr><th>Metric</th><th>Value</th><th>vs ICAO Target</th></tr></thead>
                <tbody>
                  <tr><td>Industry Avg Reporting Rate</td><td style={{fontWeight:700}}>{benchmark.industry_average_reporting_rate}%</td><td style={{color: benchmark.industry_average_reporting_rate >= 80 ? '#2ecc71' : '#e74c3c'}}>{benchmark.industry_average_reporting_rate >= 80 ? '✓' : '✗'}</td></tr>
                  <tr><td>Best-in-Class Rate</td><td style={{fontWeight:700}}>{benchmark.best_in_class_rate}%</td><td style={{color:'#2ecc71'}}>★</td></tr>
                  <tr><td>ICAO Benchmark</td><td style={{fontWeight:700}}>{benchmark.icao_benchmark}%</td><td>Target</td></tr>
                  <tr><td>Total Tenants</td><td style={{fontWeight:700}}>{benchmark.total_tenants}</td><td>—</td></tr>
                </tbody>
              </table>
            </div>
          ) : <NoData />}
        </ChartCard>
        <ChartCard title="Per-Tenant Reporting Rate">
          {benchmark && benchmark.tenant_rates && benchmark.tenant_rates.length ? (
            <BarChart data={benchmark.tenant_rates.map(t => ({ ...t, label: t.tenant_id.slice(0,8) }))} labelKey="label" valueKey="reporting_rate" color="#0db39e" />
          ) : <NoData />}
        </ChartCard>
      </div>

      {health && (
        <div className="just-culture-detail">
          <h3 style={{fontSize:14, color:'#333', marginBottom:12}}>Component Details</h3>
          <table>
            <thead><tr><th>Component</th><th>Value</th><th>Weight</th><th>Weighted Contribution</th></tr></thead>
            <tbody>
              <tr><td>Reporting Rate</td><td>{health.reporting_rate}%</td><td>60%</td><td>{(health.reporting_rate * 0.6).toFixed(1)}</td></tr>
              <tr><td>Trend Score</td><td>{health.trend_score}</td><td>20%</td><td>{(health.trend_score * 0.2).toFixed(1)}</td></tr>
              <tr><td>Diversity Score</td><td>{health.diversity_score}</td><td>20%</td><td>{(health.diversity_score * 0.2).toFixed(1)}</td></tr>
              <tr style={{fontWeight:700, background:'#f8f9fa'}}><td>Health Score</td><td>{health.health_score}</td><td>100%</td><td>{health.health_score}</td></tr>
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ----- Chart Components -----

function BarChart({ data, labelKey, valueKey, color }) {
  const canvas = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!canvas.current || !data || !data.length) return;
    if (chartRef.current) chartRef.current.destroy();
    const ctx = canvas.current.getContext('2d');
    chartRef.current = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: data.map(d => d[labelKey]),
        datasets: [{ label: valueKey, data: data.map(d => d[valueKey]), backgroundColor: color, borderRadius: 4 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } }, x: { grid: { display: false } } }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [data, labelKey, valueKey, color]);
  return <canvas ref={canvas}></canvas>;
}

function LineChart({ data, labelKey, valueKey, color }) {
  const canvas = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!canvas.current || !data || !data.length) return;
    if (chartRef.current) chartRef.current.destroy();
    const ctx = canvas.current.getContext('2d');
    chartRef.current = new Chart(ctx, {
      type: 'line',
      data: {
        labels: data.map(d => d[labelKey]),
        datasets: [{ label: valueKey, data: data.map(d => d[valueKey]), borderColor: color, backgroundColor: color + '22', fill: true, tension: 0.3, pointRadius: 3 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true }, x: { grid: { display: false }, ticks: { maxTicksLimit: 12 } } }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [data, labelKey, valueKey, color]);
  return <canvas ref={canvas}></canvas>;
}

function DoughnutChart({ data, labelKey, valueKey }) {
  const canvas = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!canvas.current || !data || !data.length) return;
    if (chartRef.current) chartRef.current.destroy();
    const ctx = canvas.current.getContext('2d');
    chartRef.current = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: data.map(d => d[labelKey]),
        datasets: [{ data: data.map(d => d[valueKey]), backgroundColor: COLORS.slice(0, data.length) }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, padding: 8, font: { size: 11 } } } }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [data, labelKey, valueKey]);
  return <canvas ref={canvas}></canvas>;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
